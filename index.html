<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The General</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #111; color: #ddd; font-family: monospace; font-size: 13px; }

    /* ── Setup screen ─────────────────────────────────────── */
    #setup-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 16px;
    }
    #setup-screen h1 { font-size: 2rem; color: #e8c97f; letter-spacing: 3px; }
    #setup-screen p  { color: #888; max-width: 420px; text-align: center; line-height: 1.6; }
    #setup-form { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    #setup-form label { color: #aaa; }
    #setup-form select, #setup-form input {
      background: #222; color: #ddd; border: 1px solid #444; padding: 6px 10px;
      border-radius: 4px; font-family: monospace; font-size: 13px;
    }
    #setup-form button {
      margin-top: 8px; padding: 10px 28px;
      background: #8b6914; color: #fff; border: none; border-radius: 4px;
      font-family: monospace; font-size: 14px; cursor: pointer;
    }
    #setup-form button:hover { background: #c0941e; }

    /* ── Game screen ──────────────────────────────────────── */
    #game-screen {
      display: none; height: 100vh;
      flex-direction: row; overflow: hidden;
    }

    /* Left: map + bottom panels */
    #left-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    #map-area {
      flex: 1; background: #1a1a2e; position: relative; overflow: hidden;
    }
    #map-svg { width: 100%; height: 100%; display: block; }

    #country-info {
      padding: 8px 12px; background: #1c1c1c; border-top: 1px solid #333;
      min-height: 70px; line-height: 1.6; font-size: 12px;
    }

    /* Bottom: battle log + event log */
    #bottom-panels {
      display: flex; height: 200px; border-top: 1px solid #333;
    }
    #battle-panel, #event-panel {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      background: #161616;
    }
    #battle-panel { border-right: 1px solid #333; }
    #battle-panel h4, #event-panel h4 {
      color: #888; text-transform: uppercase; font-size: 10px;
      letter-spacing: 1px; margin-bottom: 6px;
    }

    /* Right: HUD */
    #hud-panel {
      width: 320px; background: #1a1a1a; border-left: 1px solid #333;
      overflow-y: auto; flex-shrink: 0;
    }
    #hud-container { padding: 10px; }

    /* Postgame overlay */
    #postgame-container {
      display: none; padding: 20px; overflow-y: auto;
      max-height: 100vh;
    }
    #new-game-btn {
      display: none; margin-top: 16px; padding: 10px 24px;
      background: #8b6914; color: #fff; border: none; border-radius: 4px;
      font-family: monospace; font-size: 14px; cursor: pointer;
    }

    /* ── HUD styles ───────────────────────────────────────── */
    .hud-header {
      background: #222; padding: 8px 10px; border-bottom: 1px solid #333;
      font-size: 12px;
    }
    .hud-name { font-size: 15px; font-weight: bold; }
    .hud-summary { padding: 6px 10px; font-size: 11px; color: #aaa; border-bottom: 1px solid #2a2a2a; }

    .hud-section-header {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #777; padding: 8px 10px 4px; border-top: 1px solid #2a2a2a;
      margin-top: 4px;
    }
    .hud-section { padding: 4px 10px 8px; }

    .alloc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .alloc-table th { color: #666; text-align: left; padding: 2px 4px; border-bottom: 1px solid #2a2a2a; }
    .alloc-table td { padding: 3px 4px; vertical-align: middle; }
    .alloc-table button {
      background: #333; color: #ccc; border: 1px solid #444; width: 22px; height: 22px;
      cursor: pointer; font-size: 14px; line-height: 1; border-radius: 3px; margin: 0 2px;
    }
    .alloc-table button:hover { background: #555; }

    .sci-total { font-size: 10px; color: #666; margin-top: 4px; }

    .gen-card {
      background: #1e1e1e; padding: 8px; margin-bottom: 8px;
      border-radius: 4px; border: 1px solid #2a2a2a;
    }
    .gen-actions { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .gen-action-select, .target-select {
      background: #2a2a2a; color: #ddd; border: 1px solid #444; padding: 3px 6px;
      font-family: monospace; font-size: 11px; border-radius: 3px;
    }
    .attack-config { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
    .attack-config input { background: #2a2a2a; color: #ddd; border: 1px solid #444; padding: 3px 4px; font-family: monospace; }
    .hidden { display: none !important; }

    .recruit-btn {
      margin-top: 8px; padding: 6px 16px;
      background: #2a4a2a; color: #8fc; border: 1px solid #3a7a3a;
      font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 3px;
    }
    .recruit-btn:hover { background: #3a6a3a; }

    .end-turn-btn {
      display: block; width: calc(100% - 20px); margin: 12px 10px;
      padding: 10px; background: #8b6914; color: #fff;
      border: none; border-radius: 4px; font-family: monospace;
      font-size: 14px; font-weight: bold; cursor: pointer; letter-spacing: 1px;
    }
    .end-turn-btn:hover { background: #c0941e; }

    .sci-levels p { font-size: 11px; color: #aaa; padding: 1px 0; }

    /* ── Battle log styles ───────────────────────────────── */
    .battle-section { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
    .battle-header { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
    .battle-losses { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .battle-result { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
    .battle-result.attackerVictory { background: #2a4a1a; color: #8fc; }
    .battle-result.defenderVictory { background: #4a1a1a; color: #f88; }
    .battle-result.stalemate       { background: #3a3a1a; color: #fc8; }
    .log-toggle {
      background: none; border: 1px solid #333; color: #777;
      padding: 2px 6px; font-family: monospace; font-size: 10px; cursor: pointer;
    }
    .log-toggle:hover { color: #aaa; }
    .battle-log-lines { margin-top: 6px; font-size: 10px; color: #999; line-height: 1.5; }
    .battle-log-lines p { margin: 1px 0; }
    .event-important { color: #f88 !important; }

    .score-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .score-table th, .score-table td { padding: 6px 10px; border-bottom: 1px solid #2a2a2a; text-align: left; }
    .score-table th { color: #777; font-size: 10px; text-transform: uppercase; }

    .history-chart p { font-size: 11px; color: #888; padding: 1px 0; }

    .muted { color: #666; }
    p.muted { padding: 4px 0; }
  </style>
</head>
<body>

  <!-- ── Setup screen ─────────────────────────────────────── -->
  <div id="setup-screen">
    <h1>THE GENERAL</h1>
    <p>A turn-based strategy game. Manage your population, build science, recruit generals, and conquer your rivals over 120 years.</p>
    <form id="setup-form">
      <label for="country-count">Number of countries (including you):</label>
      <select id="country-count">
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5" selected>5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <button type="submit">Start Game</button>
    </form>
  </div>

  <!-- ── Game screen ───────────────────────────────────────── -->
  <div id="game-screen">

    <!-- Left: map + info + logs -->
    <div id="left-panel">
      <div id="map-area">
        <svg id="map-svg" viewBox="0 0 960 620" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <div id="country-info">Click a country to inspect it.</div>

      <div id="bottom-panels">
        <div id="battle-panel">
          <h4>Battles</h4>
          <div id="battle-container"></div>
        </div>
        <div id="event-panel">
          <h4>Turn Events</h4>
          <div id="log-container"></div>
        </div>
      </div>
    </div>

    <!-- Right: HUD -->
    <div id="hud-panel">
      <div id="hud-container"></div>
      <div id="postgame-container"></div>
      <button id="new-game-btn">New Game</button>
    </div>

  </div>

  <script type="module" src="src/ui/main.js"></script>
</body>
</html>
